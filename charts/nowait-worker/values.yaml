# nowait-worker 공통 기본값
# 환경별 오버라이드는 envs/dev/worker-values.yaml, envs/prod/worker-values.yaml에서 관리한다.

replicaCount: 1

image:
  repository: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team6-nowait-app
  tag: "latest"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# 현재는 HPA 사용.
# 나중에 KEDA로 전환하면 hpa.enabled=false, keda.enabled=true로 바꾼다.
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# KEDA로 전환 시 hpa.enabled=false로 같이 바꾼다.
# worker는 CPU 대신 Redis pending 큐 깊이(Prometheus 트리거)로 스케일한다 —
# 비동기 큐 처리라 CPU보다 큐 적체가 더 빠르고 정확한 부하 신호이기 때문.
keda:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  prometheus:
    serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
    query: "sum(waiting_queue_pending) + sum(reservation_queue_pending)"
    threshold: "20"
    activationThreshold: "1"

monitoring:
  enabled: true

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreName: team6-nowait-cluster-secret-store
  secretStoreKind: ClusterSecretStore
  dataFrom: []
  data: []

env:
  SPRING_PROFILES_ACTIVE: ""
  SERVER_PORT: "8080"
  REDIS_SSL_ENABLED: "false"

serviceAccount:
  name: nowait-worker-sa

namespace: nowait-dev