# nowait-worker 공통 기본값
# 환경별 오버라이드는 envs/dev/worker-values.yaml, envs/prod/worker-values.yaml에서 관리한다.

replicaCount: 1

image:
  repository: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team6-nowait-app
  tag: "latest"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# 현재는 HPA 사용.
# 나중에 KEDA로 전환하면 hpa.enabled=false, keda.enabled=true로 바꾼다.
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# KEDA ScaledObject 템플릿은 아직 없으므로 기본값은 false.
# keda.enabled=true로 바꾸려면 templates/scaledobject.yaml을 추가해야 한다.
keda:
  enabled: false

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreName: team6-nowait-cluster-secret-store
  secretStoreKind: ClusterSecretStore
  dataFrom: []
  data: []

env:
  SPRING_PROFILES_ACTIVE: ""
  SERVER_PORT: "8080"
  REDIS_SSL_ENABLED: "false"

serviceAccount:
  name: nowait-worker-sa

namespace: nowait-dev