# dev 환경 worker 오버라이드 값

replicaCount: 1

image:
  tag: "dev-b3462e5"  # cicd.yml에서 이미지 태그 자동 갱신

hpa:
  minReplicas: 1
  maxReplicas: 2

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "dev"

externalSecret:
  secrets:
    - secretKey: api
      remoteKey: team6-nowait/dev/api
    - secretKey: redis
      remoteKey: team6-nowait/dev/redis

namespace: nowait-dev