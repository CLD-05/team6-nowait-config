apiVersion: v1
kind: Service
metadata:
  name: nowait-api
  namespace: {{ .Values.namespace }}
  labels:
    app: nowait-api
    team: team6
spec:
  type: {{ .Values.service.type }}
  selector:
    app: nowait-api
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
