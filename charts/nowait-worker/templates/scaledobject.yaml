{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: nowait-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: nowait-worker
    team: team6
spec:
  scaleTargetRef:
    name: nowait-worker
  minReplicaCount: {{ .Values.keda.minReplicas }}
  maxReplicaCount: {{ .Values.keda.maxReplicas }}
  {{- if .Values.keda.behavior }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        {{- toYaml .Values.keda.behavior | nindent 8 }}
  {{- end }}
  triggers:
    # worker는 동기 HTTP가 아니라 Redis 큐를 비동기로 비우는 역할이라, CPU보다
    # 큐 적체(pending) 깊이가 더 빠르고 정확한 부하 신호다. WaitingMetrics/
    # ReservationMetrics가 노출하는 Gauge를 Prometheus 트리거로 그대로 사용한다.
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.keda.prometheus.serverAddress }}
        query: {{ .Values.keda.prometheus.query | quote }}
        threshold: "{{ .Values.keda.prometheus.threshold }}"
        activationThreshold: "{{ .Values.keda.prometheus.activationThreshold }}"
{{- end }}