apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nowait-dev

resources:
  - ../../base
  - namespace.yaml
  - configmap.yaml
  - clustersecretstore.yaml
  - externalsecret.yaml

images:
  - name: nowait-app
    newName: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team6-nowait-app
    newTag: dev-latest

patches:
  - path: ingress-patch.yaml
  - path: hpa-api-patch.yaml
  - path: deployment-api-patch.yaml
  - path: deployment-waiting-worker-patch.yaml

commonLabels:
  environment: dev
