# dev 환경 worker 오버라이드 값

replicaCount: 1

image:
  tag: "dev-618914b"  # cicd.yml에서 이미지 태그 자동 갱신

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  prometheus:
    serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
    query: "sum(waiting_queue_pending) + sum(reservation_queue_pending)"
    threshold: "20"
    activationThreshold: "1"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    # api와 동일한 이유로 콜드스타트 CPU 쓰로틀링을 풀어준다 (request는 그대로 유지).
    cpu: 1500m
    memory: 1Gi

env:
  # reservation-worker / waiting-worker 프로필이 빠지면 ReservationSyncWorker,
  # WaitingSyncWorker, NoShow/CallTimeout/DailyOpen 스케줄러가 전부 비활성화되어
  # Redis에 생성된 예약·웨이팅이 DB에 영원히 동기화되지 않는다.
  SPRING_PROFILES_ACTIVE: "dev,reservation-worker,waiting-worker"
  # WaitingSyncWorker 청크 배치 처리 튜닝값 (이미지 재빌드 없이 조정 가능).
  # batch=한 폴링당 pop 토큰 수, chunk=한 트랜잭션으로 묶는 단위. (기본 50/25)
  WAITING_WORKER_BATCH_SIZE: "50"
  WAITING_WORKER_CHUNK_SIZE: "25"
  # ReservationSyncWorker 청크 배치 처리 튜닝값. 예약은 슬롯 PESSIMISTIC 락을 청크 동안
  # 길게 쥐므로, hot 슬롯 경합(batch_fallback 급증)이 보이면 CHUNK_SIZE를 5~10으로 낮춘다.
  RESERVATION_WORKER_BATCH_SIZE: "50"
  RESERVATION_WORKER_CHUNK_SIZE: "25"

externalSecret:
  dataFrom:
    - key: team6-nowait/dev/api

  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_HOST
    - secretKey: REDIS_PORT
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_PORT
    # DB 비번은 RDS 관리형 시크릿(manage_master_user_password=true, 자동 로테이션)에서
    # 직접 읽는다. dataFrom의 team6-nowait/dev/api에도 DB_PASSWORD가 있지만 data가
    # 우선하므로, RDS 비번이 로테이션돼도 항상 현재 값이 적용된다.
    # (과거: api 시크릿의 정적 비번이 RDS 로테이션과 어긋나 Access denied → 전체 5xx 장애)
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "rds!db-373735b1-3f9e-4833-b9e2-b2d6c1dc53a4"
        property: password

namespace: nowait-dev