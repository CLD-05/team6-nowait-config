# prod 환경 api 오버라이드 값
replicaCount: 2
image:
  tag: "prod-618914b"
ingress:
  host: api.nowait.singleuser.cloud
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:194722398200:certificate/19e45faf-b37a-44c6-b79f-b62954b4ee22"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # SSE(/notifications/stream) 롱커넥션 유지를 위해 ALB idle timeout을 300초로 고정.
    # 이 어노테이션이 없으면 AWS 기본값 60초로 되돌아가, ALB Controller reconcile 시
    # SSE 연결이 60초 idle마다 끊길 수 있다. (라이브 ALB엔 300으로 수동 설정돼 있었으나
    # chart에 없어 드리프트 상태였던 것을 코드화)
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
    # 800 VU 예약 부하테스트에서 API 파드 일부(2/14)만 톰캣 스레드(200)가 포화되고 나머지는
    # 유휴 → p95 꼬리 지연(~1.65s) 발생. round_robin은 요청 개수만 균등 분배(load-unaware)라
    # 무겁거나 느린 요청이 몰린 타겟이 포화된다. least_outstanding_requests는 처리 중(in-flight)
    # 요청이 가장 적은 타겟으로 라우팅해 쏠림을 자가 보정한다.
    # ⚠️ 위 load-balancer-attributes(idle_timeout)와는 별개 어노테이션이므로 합치지 말 것.
    alb.ingress.kubernetes.io/target-group-attributes: load_balancing.algorithm.type=least_outstanding_requests
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
# prod 미구축 상태에서 dev와 동일하게 미리 KEDA로 전환해둔다.
# targetCPU/Memory는 dev와 동일한 기준치를 그대로 가져온 것이라, prod 부하테스트 후 재조정 필요.
keda:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  # scale-down이 너무 빠르게 일어나며 새 pod가 startup probe도 통과하기 전에
  # 다시 줄어드는 flapping 현상 발견(2026-06-26 부하테스트 Phase1에서 확인).
  # scale-down만 5분간 안정화시키고, scale-up은 즉시 반응 유지.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
# prod: m6i.large 기준 (로드밸런싱 반영 - T계열 사용 금지)
resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi
pdb:
  minAvailable: 1
env:
  SPRING_PROFILES_ACTIVE: "prod"
  REDIS_SSL_ENABLED: "true"
  DB_URL: jdbc:mysql://team6-nowait-prod-rds.cx482c6a63zp.ap-northeast-2.rds.amazonaws.com:3306/nowait?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# team6-nowait/prod/redis 시크릿에 REDIS_HOST/REDIS_PORT 외에
# REDIS_PASSWORD(= terraform output의 elasticache auth_token)도 넣어야 한다.
externalSecret:
  refreshInterval: 5m
  dataFrom:
    - key: team6-nowait/prod/api
    - key: team6-nowait/prod/redis
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: "arn:aws:secretsmanager:ap-northeast-2:194722398200:secret:rds!db-9b19032e-8175-459a-935c-506f967b375f-g7TldR"
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "arn:aws:secretsmanager:ap-northeast-2:194722398200:secret:rds!db-9b19032e-8175-459a-935c-506f967b375f-g7TldR"
        property: password
namespace: nowait-prod
