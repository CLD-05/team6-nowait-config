# dev 환경 api 오버라이드 값

replicaCount: 1

image:
  tag: "dev-e746baf"  # cicd.yml에서 이미지 태그 자동 갱신

ingress:
  host: "" 

hpa:
  minReplicas: 1
  maxReplicas: 3

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "dev"

externalSecret:
  dataFrom:
    - key: team6-nowait/dev/api
    - key: team6-nowait/dev/redis

namespace: nowait-dev
