{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nowait-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: nowait-worker
    team: team6
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: nowait-worker
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
  endpoints:
    - targetPort: 8080
      path: /actuator/prometheus
      interval: 15s
{{- end }}
