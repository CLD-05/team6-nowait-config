# dev 환경 api 오버라이드 값

replicaCount: 1

image:
  tag: "dev-af14b75"  # cicd.yml에서 이미지 태그 자동 갱신

ingress:
  host: "" 

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    # 500m였을 때 부팅 중 JPA/Hibernate 클래스로딩 구간이 CPU 쓰로틀링으로
    # 2~3배 늘어져 콜드스타트가 60~100초+ 걸렸다. 노드 실사용률은 평소 10% 미만이라
    # limit만 올려도(request는 유지) 스케줄링 여유를 깎지 않고 부팅 버스트만 풀어준다.
    cpu: 1500m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "dev"

externalSecret:
  dataFrom:
    - key: team6-nowait/dev/api

  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_HOST
    - secretKey: REDIS_PORT
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_PORT

namespace: nowait-dev
