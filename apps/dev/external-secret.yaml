# SecretStore
# ESO가 AWS Secrets Manager에 접근하는 방법을 정의합니다.
# Pod Identity로 인증하므로 별도 credentials 불필요합니다.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: nowait-secret-store
  namespace: nowait-dev
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets

---
# ExternalSecret
# Secrets Manager의 값을 K8s Secret으로 동기화합니다.
# Secrets Manager에 team6/nowait/dev 경로로 시크릿을 생성해두면 됩니다.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nowait-app-secret
  namespace: nowait-dev
spec:
  refreshInterval: 1h  # 1시간마다 동기화

  secretStoreRef:
    name: nowait-secret-store
    kind: SecretStore

  target:
    name: nowait-app-secret  # 생성될 K8s Secret 이름
    creationPolicy: Owner

  data:
    # DB 접속 정보
    - secretKey: DB_URL
      remoteRef:
        key: team6/nowait/dev
        property: DB_URL

    - secretKey: DB_USERNAME
      remoteRef:
        key: team6/nowait/dev
        property: DB_USERNAME

    - secretKey: DB_PASSWORD
      remoteRef:
        key: team6/nowait/dev
        property: DB_PASSWORD

    # Redis 접속 정보
    - secretKey: REDIS_HOST
      remoteRef:
        key: team6/nowait/dev
        property: REDIS_HOST

    - secretKey: REDIS_PORT
      remoteRef:
        key: team6/nowait/dev
        property: REDIS_PORT
