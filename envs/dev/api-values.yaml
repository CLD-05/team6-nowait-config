# dev 환경 api 오버라이드 값

replicaCount: 1

image:
  tag: "dev-d473bbd"  # cicd.yml에서 이미지 태그 자동 갱신

ingress:
  host: "" 

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

resources:
  requests:
    cpu: 250m
    # 부하테스트(2026-06-19): idle 실사용 ~450Mi(=88% of 512Mi)가 KEDA 메모리 target(70%)을
    # 상시 초과 → api가 maxReplicas(3)에 고정됐다. request를 올려 idle 비율을 낮추고
    # 실부하(CPU/메모리) 기준으로 정상 스케일되도록 한다.
    memory: 768Mi
  limits:
    # 500m였을 때 부팅 중 JPA/Hibernate 클래스로딩 구간이 CPU 쓰로틀링으로
    # 2~3배 늘어져 콜드스타트가 60~100초+ 걸렸다. 노드 실사용률은 평소 10% 미만이라
    # limit만 올려도(request는 유지) 스케줄링 여유를 깎지 않고 부팅 버스트만 풀어준다.
    cpu: 1500m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "dev"

externalSecret:
  dataFrom:
    - key: team6-nowait/dev/api

  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_HOST
    - secretKey: REDIS_PORT
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_PORT

namespace: nowait-dev
