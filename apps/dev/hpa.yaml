apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nowait-api-hpa
  namespace: nowait-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nowait-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
# CPU 사용률이 50%를 초과하면 자동으로 스케일링하여 최대 5개의 파드로 확장