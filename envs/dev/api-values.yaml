# dev 환경 api 오버라이드 값

replicaCount: 1

image:
  tag: "dev-0982f44"  # cicd.yml에서 이미지 태그 자동 갱신

ingress:
  host: "" 

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

resources:
  requests:
    cpu: 250m
    # 부하테스트(2026-06-19): idle 실사용 ~450Mi(=88% of 512Mi)가 KEDA 메모리 target(70%)을
    # 상시 초과 → api가 maxReplicas(3)에 고정됐다. request를 올려 idle 비율을 낮추고
    # 실부하(CPU/메모리) 기준으로 정상 스케일되도록 한다.
    memory: 768Mi
  limits:
    # 500m였을 때 부팅 중 JPA/Hibernate 클래스로딩 구간이 CPU 쓰로틀링으로
    # 2~3배 늘어져 콜드스타트가 60~100초+ 걸렸다. 노드 실사용률은 평소 10% 미만이라
    # limit만 올려도(request는 유지) 스케줄링 여유를 깎지 않고 부팅 버스트만 풀어준다.
    cpu: 1500m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "dev"

externalSecret:
  dataFrom:
    - key: team6-nowait/dev/api

  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_HOST
    - secretKey: REDIS_PORT
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_PORT
    # DB 비번은 RDS 관리형 시크릿(manage_master_user_password=true, 자동 로테이션)에서
    # 직접 읽는다. dataFrom의 team6-nowait/dev/api에도 DB_PASSWORD가 있지만 data가
    # 우선하므로, RDS 비번이 로테이션돼도 항상 현재 값이 적용된다.
    # (과거: api 시크릿의 정적 비번이 RDS 로테이션과 어긋나 Access denied → 전체 5xx 장애)
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "rds!db-373735b1-3f9e-4833-b9e2-b2d6c1dc53a4"
        property: password

namespace: nowait-dev
