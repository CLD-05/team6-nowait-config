# prod 환경 api 오버라이드 값

replicaCount: 2

image:
  tag: "latest"  # cicd.yml에서 이미지 태그 자동 갱신

ingress:
  host: api.nowait.com  # 실제 도메인 또는 Route53으로 교체 필요

hpa:
  minReplicas: 2
  maxReplicas: 10

# prod: m6i.large 기준 (피드백 반영 - T계열 사용 금지)
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

pdb:
  minAvailable: 1

env:
  SPRING_PROFILES_ACTIVE: "prod"

externalSecret:
  dataFrom:
    - key: team6-nowait/prod/api
    - key: team6-nowait/prod/redis

namespace: nowait-prod
