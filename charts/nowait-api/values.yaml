# nowait-api 공통 기본값
# 환경별 오버라이드는 envs/dev/api-values.yaml, envs/prod/api-values.yaml 참고

replicaCount: 2

image:
  repository: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/nowait-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
  host: ""  # envs에서 오버라이드
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreName: team6-nowait-cluster-secret-store
  secretStoreKind: ClusterSecretStore
  secrets:
     - secretKey: api
       remoteKey: ""
     - secretKey: redis
       remoteKey: ""

env:
  SPRING_PROFILES_ACTIVE: ""  # envs에서 오버라이드
  SERVER_PORT: "8080"

serviceAccount:
  name: nowait-api-sa

namespace: nowait-dev
