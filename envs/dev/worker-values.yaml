# dev 환경 worker 오버라이드 값

replicaCount: 1

image:
  tag: "dev-e6c0585"  # cicd.yml에서 이미지 태그 자동 갱신

hpa:
  minReplicas: 1
  maxReplicas: 2

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "dev"

externalSecret:
  dataFrom:
    - key: team6-nowait/dev/api

  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_HOST
    - secretKey: REDIS_PORT
      remoteRef:
        key: team6-nowait/dev/redis
        property: REDIS_PORT

namespace: nowait-dev