# nowait-api 공통 기본값
# 환경별 오버라이드는 envs/dev/api-values.yaml, envs/prod/api-values.yaml에서 관리한다.

replicaCount: 2

image:
  repository: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team6-nowait-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
    alb.ingress.kubernetes.io/certificate-arn: "<ACM_CERTIFICATE_ARN_PLACEHOLDER>"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
  host: ""
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# 현재는 HPA 사용.
# 나중에 KEDA로 전환하면 hpa.enabled=false, keda.enabled=true로 바꾼다.
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# KEDA로 전환 시 hpa.enabled=false로 같이 바꾼다 (둘 다 켜두면 같은 Deployment를
# 두 컨트롤러가 동시에 스케일하려고 경쟁한다).
keda:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

# ServiceMonitor + PrometheusRule (kube-prometheus-stack이 monitoring 네임스페이스에
# 떠 있어야 함, release 라벨로 자동 탐색)
monitoring:
  enabled: true

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreName: team6-nowait-cluster-secret-store
  secretStoreKind: ClusterSecretStore
  dataFrom: []
  data: []

env:
  SPRING_PROFILES_ACTIVE: ""
  SERVER_PORT: "8080"
  REDIS_SSL_ENABLED: "false"

serviceAccount:
  name: nowait-api-sa

namespace: nowait-dev