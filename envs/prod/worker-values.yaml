# prod 환경 worker 오버라이드 값
replicaCount: 2
image:
  tag: "prod-612cede"
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
# prod 미구축 상태에서 dev와 동일하게 미리 KEDA로 전환해둔다.
# threshold/activationThreshold는 dev 값을 그대로 가져온 것이라, prod 부하테스트 후 재조정 필요.
keda:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  prometheus:
    serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
    query: "sum(waiting_queue_pending) + sum(reservation_queue_pending)"
    threshold: "20"
    activationThreshold: "1"
# prod: m6i.large 기준 (로드밸런싱 반영 - T계열 사용 금지)
resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi
env:
  # reservation-worker / waiting-worker 프로필이 빠지면 ReservationSyncWorker,
  # WaitingSyncWorker, NoShow/CallTimeout/DailyOpen 스케줄러가 전부 비활성화되어
  # Redis에 생성된 예약·웨이팅이 DB에 영원히 동기화되지 않는다.
  SPRING_PROFILES_ACTIVE: "prod,reservation-worker,waiting-worker"
  REDIS_SSL_ENABLED: "true"
  DB_URL: jdbc:mysql://team6-nowait-prod-rds.cx482c6a63zp.ap-northeast-2.rds.amazonaws.com:3306/nowait?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# team6-nowait/prod/redis 시크릿에 REDIS_HOST/REDIS_PORT 외에
# REDIS_PASSWORD(= terraform output의 elasticache auth_token)도 넣어야 한다.
externalSecret:
  dataFrom:
    - key: team6-nowait/prod/api
    - key: team6-nowait/prod/redis
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: arn:aws:secretsmanager:ap-northeast-2:194722398200:secret:rds!db-9b19032e-8175-459a-935c-506f967b375f-g7TldR
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: arn:aws:secretsmanager:ap-northeast-2:194722398200:secret:rds!db-9b19032e-8175-459a-935c-506f967b375f-g7TldR
        property: password
namespace: nowait-prod
