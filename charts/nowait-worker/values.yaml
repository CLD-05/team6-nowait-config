# nowait-worker 공통 기본값
# 환경별 오버라이드는 envs/dev/worker-values.yaml, envs/prod/worker-values.yaml 참고

replicaCount: 1

image:
  repository: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/nowait-worker
  tag: "latest"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreName: nowait-secret-store
  secretStoreKind: ClusterSecretStore
  secrets:
    - secretKey: DB_URL
      remoteKey: /nowait/db/url
    - secretKey: DB_USERNAME
      remoteKey: /nowait/db/username
    - secretKey: DB_PASSWORD
      remoteKey: /nowait/db/password
    - secretKey: REDIS_HOST
      remoteKey: /nowait/redis/host

env:
  SPRING_PROFILES_ACTIVE: ""  # envs에서 오버라이드
  SERVER_PORT: "8080"

serviceAccount:
  name: nowait-worker-sa

namespace: nowait
